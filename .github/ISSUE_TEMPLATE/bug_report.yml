name: Bug Report
description: Found something broken? Let us know.
labels: ['bug', 'triage']
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@a2a-mesha2a-mesh'
        - '@a2a-mesha2a-mesh-client'
        - '@a2a-mesha2a-mesh-adapters'
        - '@a2a-mesha2a-mesh-registry'
        - '@a2a-mesha2a-mesh-grpc'
        - '@a2a-mesha2a-mesh-testing'
        - 'a2a (CLI)'
        - 'Other'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: 'e.g. 1.0.2'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal TypeScript snippet or repo link
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: dropdown
    id: node-version
    attributes:
      label: Node.js version
      options: ['20', '22', '23', 'Other']
